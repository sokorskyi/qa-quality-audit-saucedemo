name: API Tests (Postman)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Newman
        run: npm install -g newman

      - name: Run API tests
        run: newman run API/collection/portfolio-api-tests.postman_collection.json -e API/environments/environments/qa_environment.json
